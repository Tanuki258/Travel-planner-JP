<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>旅遊排程規劃器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg0: #faf7f2;
  --bg1: #f5f0e8;
  --bg2: #ede6d8;
  --bg3: #e4d9c8;
  --accent: #c4854a;
  --accent2: #d9a06e;
  --accent-light: #f3e6d8;
  --gold: #b8832a;
  --teal: #5a9e8a;
  --rose: #c45a5a;
  --text1: #3a2e22;
  --text2: #7a6650;
  --text3: #a8937a;
  --border: #ddd0bc;
  --border-light: #ede6d8;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(100,70,30,0.08);
  --shadow-md: 0 4px 20px rgba(100,70,30,0.12);
}
html, body { height: 100%; }
body {
  font-family: 'Noto Sans TC', -apple-system, sans-serif;
  background: var(--bg0);
  color: var(--text1);
  min-height: 100vh;
  background-image: 
    radial-gradient(circle at 20% 20%, rgba(196,133,74,0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(90,158,138,0.05) 0%, transparent 50%);
}
.app { max-width: 840px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

/* Header */
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; gap: 12px; flex-wrap: wrap; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 40px; height: 40px; border-radius: 12px;
  background: linear-gradient(135deg, #c4854a, #5a9e8a);
  display: flex; align-items: center; justify-content: center;
  font-size: 19px; color: #fff; flex-shrink: 0;
  box-shadow: 0 3px 10px rgba(196,133,74,0.35);
}
.trip-name {
  font-family: 'Noto Serif TC', serif;
  font-size: 20px; font-weight: 600; cursor: pointer;
  border: none; background: none; color: var(--text1);
  font-family: inherit; border-bottom: 1.5px solid transparent;
  transition: border-color .15s;
}
.trip-name:hover { border-color: var(--accent2); }
.trip-name-input {
  font-family: 'Noto Serif TC', serif;
  font-size: 20px; font-weight: 600; background: none;
  border: none; border-bottom: 2px solid var(--accent);
  color: var(--text1); font-family: inherit; outline: none; width: 260px;
}
.topbar-right { display: flex; gap: 8px; }

/* Buttons */
.btn {
  padding: 8px 16px; border-radius: var(--radius); font-size: 13px;
  font-weight: 500; cursor: pointer; border: 1px solid var(--border);
  background: var(--bg1); color: var(--text2); transition: all .15s;
  font-family: inherit; display: inline-flex; align-items: center; gap: 5px;
  box-shadow: var(--shadow);
}
.btn:hover { background: var(--bg2); color: var(--text1); border-color: var(--accent2); }
.btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 3px 10px rgba(196,133,74,0.3); }
.btn-accent:hover { background: #b5763c; color: #fff; border-color: #b5763c; opacity: 1; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-danger { color: var(--rose); }
.btn-danger:hover { background: #fdf0f0; border-color: var(--rose); }

/* Stats */
.stats { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.stat {
  flex: 1; min-width: 100px; background: var(--bg1);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: .75rem 1rem; box-shadow: var(--shadow);
}
.stat-l { font-size: 11px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .06em; }
.stat-v { font-size: 22px; font-weight: 600; font-family: 'Noto Serif TC', serif; }
.stat-v.gold { color: var(--gold); }
.stat-v.teal { color: var(--teal); }
.stat-v.acc { color: var(--accent); }

/* Tabs */
.main-tabs {
  display: flex; gap: 4px; background: var(--bg1);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 4px; margin-bottom: 1.25rem; width: fit-content;
  box-shadow: var(--shadow);
}
.tab {
  padding: 7px 18px; border-radius: 9px; font-size: 13px;
  cursor: pointer; color: var(--text2); transition: all .15s;
  border: none; background: none; font-family: inherit;
  display: inline-flex; align-items: center; gap: 6px;
}
.tab.on { background: var(--accent); color: #fff; font-weight: 500; box-shadow: 0 2px 8px rgba(196,133,74,0.3); }
.tab:hover:not(.on) { color: var(--text1); background: var(--bg2); }

/* Day nav */
.day-nav {
  display: flex; gap: 8px; margin-bottom: 1rem;
  overflow-x: auto; padding-bottom: 4px; align-items: center; flex-wrap: wrap;
}
.day-chip {
  padding: 6px 14px; border-radius: 999px; font-size: 13px;
  cursor: pointer; border: 1px solid var(--border);
  background: var(--bg1); color: var(--text2); transition: all .15s; white-space: nowrap;
  box-shadow: var(--shadow);
}
.day-chip.on { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
.day-chip:hover:not(.on) { background: var(--bg2); border-color: var(--accent2); }
.add-day {
  padding: 6px 14px; border-radius: 999px;
  border: 1.5px dashed var(--border); background: none;
  color: var(--text3); font-size: 13px; cursor: pointer;
  white-space: nowrap; font-family: inherit; transition: all .15s;
  display: inline-flex; align-items: center; gap: 4px;
}
.add-day:hover { border-color: var(--accent); color: var(--accent); }

/* Panel */
.panel {
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1rem 1.25rem;
  box-shadow: var(--shadow);
}
.panel-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem; flex-wrap: wrap; gap: 8px;
}
.panel-title { font-size: 15px; font-weight: 600; font-family: 'Noto Serif TC', serif; color: var(--text1); }
.panel-date { font-size: 13px; color: var(--text3); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
.day-total {
  font-size: 13px; color: var(--gold); font-weight: 600;
  padding: 4px 12px; background: rgba(184,131,42,0.1);
  border: 1px solid rgba(184,131,42,0.25); border-radius: 999px;
}

/* Items */
.items { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
.item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; background: var(--bg0);
  border: 1px solid var(--border-light); border-radius: var(--radius);
  transition: border-color .15s, box-shadow .15s;
}
.item:hover { border-color: var(--accent2); box-shadow: 0 2px 10px rgba(196,133,74,0.1); }
.item-time { font-size: 12px; color: var(--text3); min-width: 46px; padding-top: 2px; flex-shrink: 0; }
.item-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.item-body { flex: 1; min-width: 0; }
.item-nm { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.item-note { font-size: 12px; color: var(--text3); margin-top: 2px; }
.item-receipt-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 11px; color: var(--teal); background: rgba(90,158,138,0.1);
  border: 1px solid rgba(90,158,138,0.25); border-radius: 999px;
  padding: 1px 7px; margin-top: 3px;
}
.item-cost { font-size: 13px; font-weight: 600; color: var(--teal); white-space: nowrap; padding-top: 2px; }
.item-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; padding: 2px; transition: color .15s; }
.item-del:hover { color: var(--rose); }
.empty { text-align: center; padding: 2.5rem; color: var(--text3); font-size: 14px; }
.empty i { font-size: 32px; display: block; margin-bottom: 8px; opacity: .5; }

/* Add form */
.add-form {
  background: var(--bg0); border: 1.5px dashed var(--border);
  border-radius: var(--radius); padding: 14px;
}
.add-form-title { font-size: 12px; color: var(--text3); margin-bottom: 10px; font-weight: 500; }
.form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.form-row input, .form-row select, .form-row textarea {
  flex: 1; min-width: 100px; font-size: 13px;
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text1);
  padding: 8px 10px; outline: none; font-family: inherit;
  transition: border-color .15s, box-shadow .15s;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px rgba(196,133,74,0.12);
}
.form-row select option { background: var(--bg1); }
.form-row input[type="time"] { max-width: 140px; }
.form-row input[type="number"] { max-width: 140px; }
.form-row textarea { min-height: 60px; resize: vertical; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

/* Section divider */
.form-section {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px dashed var(--border);
}
.form-section-label {
  font-size: 11px; color: var(--accent); font-weight: 600;
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 8px; display: flex; align-items: center; gap: 5px;
}

/* Receipt tab */
.receipts-wrap { display: flex; flex-direction: column; gap: 12px; }
.receipts-summary {
  display: flex; gap: 10px; flex-wrap: wrap;
}
.receipt-stat {
  flex: 1; min-width: 110px;
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: var(--radius); padding: .75rem 1rem;
  box-shadow: var(--shadow);
}
.receipt-stat-l { font-size: 11px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .06em; }
.receipt-stat-v { font-size: 20px; font-weight: 700; font-family: 'Noto Serif TC', serif; }
.receipt-add-panel {
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1rem 1.25rem; box-shadow: var(--shadow);
}
.receipt-add-title { font-size: 14px; font-weight: 600; color: var(--text1); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; font-family: 'Noto Serif TC', serif; }
.receipt-list { display: flex; flex-direction: column; gap: 8px; }
.receipt-card {
  background: var(--bg0); border: 1px solid var(--border-light);
  border-radius: var(--radius); padding: 12px 14px;
  display: flex; gap: 12px; align-items: flex-start;
  transition: border-color .15s, box-shadow .15s;
}
.receipt-card:hover { border-color: var(--accent2); box-shadow: 0 2px 10px rgba(196,133,74,0.1); }
.receipt-icon {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0; background: var(--accent-light);
  color: var(--accent);
}
.receipt-body { flex: 1; min-width: 0; }
.receipt-title-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.receipt-name { font-size: 14px; font-weight: 500; }
.receipt-amount { font-size: 15px; font-weight: 700; color: var(--gold); }
.receipt-meta { font-size: 12px; color: var(--text3); margin-top: 3px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.receipt-cat-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 11px; border-radius: 999px; padding: 2px 8px;
  border: 1px solid; font-weight: 500;
}
.receipt-note-text { font-size: 12px; color: var(--text2); margin-top: 4px; font-style: italic; }
.receipt-img-thumb {
  width: 48px; height: 48px; border-radius: 8px; object-fit: cover;
  border: 1px solid var(--border); cursor: pointer; flex-shrink: 0;
  transition: transform .15s;
}
.receipt-img-thumb:hover { transform: scale(1.05); }
.receipt-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 17px; padding: 2px; transition: color .15s; align-self: flex-start; }
.receipt-del:hover { color: var(--rose); }

/* Image preview modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(50,35,20,0.7);
  z-index: 999; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal-img { max-width: 90vw; max-height: 85vh; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
.modal-close { position: absolute; top: 20px; right: 24px; background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; opacity: .8; }
.modal-close:hover { opacity: 1; }

/* Upload area */
.upload-area {
  flex: 1; min-width: 200px; border: 2px dashed var(--border);
  border-radius: 8px; padding: 16px; text-align: center;
  cursor: pointer; transition: all .15s; background: var(--bg0);
  color: var(--text3); font-size: 13px; position: relative;
}
.upload-area:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-area i { font-size: 22px; display: block; margin-bottom: 4px; }
.upload-preview { margin-top: 8px; }
.upload-preview img { max-width: 100%; max-height: 120px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); }

/* Map tab */
.map-wrap { background: var(--bg1); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
.map-svg-area { position: relative; background: var(--bg2); height: 280px; overflow: hidden; }
.map-svg-area svg { width: 100%; height: 100%; }
.map-legend { padding: 1rem 1.25rem; }
.map-legend-title { font-size: 13px; color: var(--text2); margin-bottom: 10px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.map-pins { display: flex; flex-direction: column; gap: 8px; }
.map-pin-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; background: var(--bg0);
  border-radius: 8px; border: 1px solid var(--border-light);
}
.pin-num {
  width: 26px; height: 26px; border-radius: 50%;
  color: #fff; font-size: 12px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.pin-info { flex: 1; }
.pin-nm { font-size: 13px; font-weight: 500; }
.pin-day { font-size: 11px; color: var(--text3); margin-top: 1px; }
.pin-type { font-size: 11px; }

/* Budget tab */
.budget-wrap { display: flex; flex-direction: column; gap: 12px; }
.budget-total {
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.25rem;
  text-align: center; box-shadow: var(--shadow);
}
.budget-total-num { font-size: 34px; font-weight: 700; color: var(--gold); margin-bottom: 4px; font-family: 'Noto Serif TC', serif; }
.budget-total-label { font-size: 13px; color: var(--text3); }
.budget-bar-row { display: flex; flex-direction: column; gap: 5px; }
.budget-bar-label { display: flex; justify-content: space-between; font-size: 13px; }
.budget-bar-track { height: 8px; background: var(--bg2); border-radius: 999px; overflow: hidden; }
.budget-bar-fill { height: 100%; border-radius: 999px; transition: width .6s ease; background: linear-gradient(90deg, var(--accent), var(--teal)); }
.budget-breakdown { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; }
.budget-cat {
  background: var(--bg0); border: 1px solid var(--border-light);
  border-radius: var(--radius); padding: .85rem 1rem;
}
.budget-cat-label { font-size: 12px; color: var(--text3); margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
.budget-cat-val { font-size: 17px; font-weight: 600; }
.budget-cat-pct { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg1); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent2); }

@media (max-width: 500px) {
  .stats { flex-direction: column; }
  .budget-breakdown { grid-template-columns: 1fr 1fr; }
  .receipts-summary { flex-direction: column; }
}

/* Subtle warm texture */
.panel, .receipt-add-panel, .budget-total, .map-wrap { position: relative; }

/* Item action buttons */
.item-actions { display: flex; gap: 2px; flex-shrink: 0; align-items: flex-start; padding-top: 1px; }
.item-edit { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; padding: 3px; transition: color .15s; }
.item-edit:hover { color: var(--accent); }
.item-del  { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; padding: 3px; transition: color .15s; }
.item-del:hover { color: var(--rose); }

/* Inline edit form */
.item-edit-form {
  margin-top: 10px; padding: 12px; background: var(--bg1);
  border: 1.5px solid var(--accent2); border-radius: var(--radius);
  display: flex; flex-direction: column; gap: 8px;
  animation: fadeIn .15s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
.item-edit-form .form-row { margin-bottom: 0; }
.item-edit-form .form-actions { margin-top: 2px; }

/* Currency group — must override .form-row input/select globals */
.cost-group { display: flex; flex: 1; min-width: 160px; max-width: 100%; }
.cost-group .curr-select,
.form-row .cost-group .curr-select {
  flex: 0 0 72px !important; min-width: 72px !important; max-width: 72px !important;
  border-radius: 8px 0 0 8px !important; border-right: none !important;
  background: var(--bg2) !important; font-size: 12px !important;
  padding: 8px 2px 8px 8px !important;
  box-shadow: none !important;
}
.cost-group .curr-input,
.form-row .cost-group .curr-input {
  flex: 1 1 0 !important; min-width: 60px !important; max-width: none !important;
  border-radius: 0 8px 8px 0 !important;
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon"><i class="ti ti-plane-tilt"></i></div>
      <button class="trip-name" id="tripNameDisplay" title="點擊編輯名稱"></button>
      <input class="trip-name-input" id="tripNameInput" style="display:none" />
    </div>
    <div class="topbar-right">
      <button class="btn btn-accent" onclick="exportTrip()"><i class="ti ti-download"></i> 匯出行程</button>
    </div>
  </div>

  <div class="stats" id="statsRow"></div>

  <div class="main-tabs">
    <button class="tab on" onclick="switchTab('schedule', this)"><i class="ti ti-calendar"></i> 行程</button>
    <button class="tab" onclick="switchTab('map', this)"><i class="ti ti-map-pin"></i> 地圖</button>
    <button class="tab" onclick="switchTab('budget', this)"><i class="ti ti-wallet"></i> 花費</button>
    <button class="tab" onclick="switchTab('receipts', this)"><i class="ti ti-receipt"></i> 收據</button>
  </div>

  <div id="tabSchedule"></div>
  <div id="tabMap" style="display:none"></div>
  <div id="tabBudget" style="display:none"></div>
  <div id="tabReceipts" style="display:none"></div>
</div>

<!-- Image modal -->
<div class="modal-overlay" id="imgModal" onclick="closeModal()">
  <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
  <img class="modal-img" id="modalImg" src="" alt="收據圖片" onclick="event.stopPropagation()" />
</div>

<script>
const TYPE = {
  sight:     { label: '景點',  color: '#5a9e8a', icon: 'ti-map-pin' },
  food:      { label: '餐飲',  color: '#c4854a', icon: 'ti-tools-kitchen-2' },
  transport: { label: '交通',  color: '#6a8fc4', icon: 'ti-bus' },
  hotel:     { label: '住宿',  color: '#9a7ec4', icon: 'ti-building' },
  shop:      { label: '購物',  color: '#c45a5a', icon: 'ti-shopping-bag' },
};
const COLORS = ['#c4854a','#5a9e8a','#b8832a','#c45a5a','#9a7ec4','#6a8fc4'];

const RECEIPT_CATS = {
  food:      { label: '餐飲', color: '#c4854a', bg: 'rgba(196,133,74,0.1)', border: 'rgba(196,133,74,0.3)', icon: 'ti-tools-kitchen-2' },
  transport: { label: '交通', color: '#6a8fc4', bg: 'rgba(106,143,196,0.1)', border: 'rgba(106,143,196,0.3)', icon: 'ti-bus' },
  hotel:     { label: '住宿', color: '#9a7ec4', bg: 'rgba(154,126,196,0.1)', border: 'rgba(154,126,196,0.3)', icon: 'ti-building' },
  shop:      { label: '購物', color: '#c45a5a', bg: 'rgba(196,90,90,0.1)', border: 'rgba(196,90,90,0.3)', icon: 'ti-shopping-bag' },
  sight:     { label: '景點/票券', color: '#5a9e8a', bg: 'rgba(90,158,138,0.1)', border: 'rgba(90,158,138,0.3)', icon: 'ti-ticket' },
  other:     { label: '其他', color: '#a89378', bg: 'rgba(168,147,120,0.1)', border: 'rgba(168,147,120,0.3)', icon: 'ti-dots' },
};

let state = {
  title: '我的旅遊行程',
  activeDay: 0,
  activeTab: 'schedule',
  days: [
    { label: '第 1 天', date: '', items: [] },
  ],
  receipts: []
};

try {
  const saved = localStorage.getItem('travel-planner-v2');
  if (saved) state = JSON.parse(saved);
} catch(e) {}

let nextId = Date.now();
let uploadPreviewData = null;

function save() {
  try { localStorage.setItem('travel-planner-v2', JSON.stringify(state)); } catch(e) {}
}

function dayTotal(d) { return d.items.reduce((s,i) => s + (i.cost||0), 0); }
function totalBudget() { return state.days.reduce((s,d) => s + dayTotal(d), 0); }
function allItems() { return state.days.reduce((s,d) => s + d.items.length, 0); }
function catTotal(type) { return state.days.flatMap(d=>d.items).filter(i=>i.type===type).reduce((s,i)=>s+(i.cost||0),0); }
function totalReceipts() { return (state.receipts||[]).reduce((s,r) => s + (r.amount||0), 0); }

function totalByCurrency(curr) {
  return state.days.flatMap(d=>d.items)
    .filter(i => (curr==='JPY' ? (!i.currency||i.currency==='JPY') : i.currency===curr) && i.cost>0)
    .reduce((s,i)=>s+i.cost, 0);
}

function renderStats() {
  const jpy = totalByCurrency('JPY'), twd = totalByCurrency('TWD');
  let budgetStr = '';
  if (jpy > 0 && twd > 0) budgetStr = `<span style="font-size:16px">¥${jpy.toLocaleString()}</span><span style="font-size:12px;color:var(--text3)"> + </span><span style="font-size:16px">NT$${twd.toLocaleString()}</span>`;
  else if (twd > 0) budgetStr = `NT$${twd.toLocaleString()}`;
  else budgetStr = `¥${jpy.toLocaleString()}`;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="stat-l">旅行天數</div><div class="stat-v acc">${state.days.length} 天</div></div>
    <div class="stat"><div class="stat-l">行程數量</div><div class="stat-v teal">${allItems()} 項</div></div>
    <div class="stat"><div class="stat-l">花費</div><div class="stat-v gold" style="font-size:${jpy>0&&twd>0?'16px':'22px'}">${budgetStr}</div></div>
    <div class="stat"><div class="stat-l">收據合計</div><div class="stat-v" style="color:var(--teal)">¥${totalReceipts().toLocaleString()}</div></div>
  `;
}

function fmt24(t) {
  // Ensure HH:MM 24-hour display
  if (!t) return '';
  const [h, m] = t.split(':');
  return `${String(parseInt(h)).padStart(2,'0')}:${(m||'00').padStart(2,'0')}`;
}

function currSymbol(curr) { return curr === 'TWD' ? 'NT$' : '¥'; }

function costDisplay(item) {
  if (!item.cost || item.cost <= 0) return '';
  const sym = currSymbol(item.currency || 'JPY');
  const cls = item.currency === 'TWD' ? 'item-cost-twd' : 'item-cost-jpy';
  return `<div class="item-cost ${cls}">${sym}${item.cost.toLocaleString()}</div>`;
}

function dayTotalDisplay(d) {
  const jpy = d.items.filter(i=>(!i.currency||i.currency==='JPY')&&i.cost>0).reduce((s,i)=>s+i.cost,0);
  const twd = d.items.filter(i=>i.currency==='TWD'&&i.cost>0).reduce((s,i)=>s+i.cost,0);
  let parts = [];
  if (jpy > 0) parts.push(`¥${jpy.toLocaleString()}`);
  if (twd > 0) parts.push(`NT$${twd.toLocaleString()}`);
  return parts.length ? parts.join(' + ') : '¥0';
}

function renderMap() {
  const allSights = state.days.flatMap((d,di) =>
    d.items.filter(i => ['sight','food','hotel'].includes(i.type)).map(it => ({...it, dayLabel: d.label, dayIdx: di}))
  );

  const svgW = 640, svgH = 260;
  const cols = 4;
  const pts = allSights.slice(0,12).map((item,i) => ({
    x: 60 + (i % cols) * 140 + Math.sin(i)*15,
    y: 60 + Math.floor(i / cols) * 80,
    label: item.name.slice(0,6),
    color: COLORS[item.dayIdx % COLORS.length]
  }));
  const lines = pts.map((_,i) => i>0 ? `<line x1="${pts[i-1].x}" y1="${pts[i-1].y}" x2="${pts[i].x}" y2="${pts[i].y}" stroke="#c4854a30" stroke-width="1.5" stroke-dasharray="5,4"/>` : '').join('');
  const circles = pts.map((p,i) => `
    <circle cx="${p.x}" cy="${p.y}" r="10" fill="${p.color}" opacity="0.85"/>
    <text x="${p.x}" y="${p.y+4}" text-anchor="middle" font-size="10" fill="#fff" font-weight="600" font-family="sans-serif">${i+1}</text>
    <text x="${p.x}" y="${p.y+22}" text-anchor="middle" font-size="10" fill="#7a6650" font-family="sans-serif">${p.label}</text>
  `).join('');

  document.getElementById('tabMap').innerHTML = `
    <div class="map-wrap">
      <div class="map-svg-area">
        <svg viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">
          <rect width="${svgW}" height="${svgH}" fill="#e4d9c8"/>
          <rect x="0" y="0" width="${svgW}" height="${svgH}" fill="url(#grid)" opacity="0.4"/>
          <defs>
            <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
              <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ddd0bc" stroke-width="0.5"/>
            </pattern>
          </defs>
          ${lines}${circles}
          ${allSights.length===0 ? '<text x="320" y="130" text-anchor="middle" font-size="14" fill="#a8937a" font-family="sans-serif">新增景點後會在這裡顯示</text>' : ''}
        </svg>
      </div>
      <div class="map-legend">
        <div class="map-legend-title"><i class="ti ti-map-2"></i> 所有景點清單</div>
        ${allSights.length===0
          ? `<div style="color:var(--text3);font-size:13px;text-align:center;padding:1rem">尚無景點</div>`
          : `<div class="map-pins">
            ${allSights.map((s,i) => `
              <div class="map-pin-row">
                <div class="pin-num" style="background:${COLORS[s.dayIdx%COLORS.length]}">${i+1}</div>
                <div class="pin-info">
                  <div class="pin-nm">${escHtml(s.name)}</div>
                  <div class="pin-day">${s.dayLabel} · ${s.time}${s.note ? ' · '+escHtml(s.note) : ''}</div>
                </div>
                <span class="pin-type" style="color:${TYPE[s.type]?.color||'#888'}">${TYPE[s.type]?.label||''}</span>
              </div>
            `).join('')}
          </div>`}
      </div>
    </div>
  `;
}

function renderBudget() {
  const recTotal = totalReceipts();

  // Per-day breakdown by currency
  const dayBars = state.days.map(d => {
    const jpy = d.items.filter(i=>(!i.currency||i.currency==='JPY')&&i.cost>0).reduce((s,i)=>s+i.cost,0);
    const twd = d.items.filter(i=>i.currency==='TWD'&&i.cost>0).reduce((s,i)=>s+i.cost,0);
    return { label: d.label, jpy, twd, total: jpy + twd };
  });
  const maxDay = Math.max(...dayBars.map(d=>d.total), 1);

  // Category totals (keep as raw numbers for bar width)
  const cats = Object.entries(TYPE).map(([k,v]) => ({ key:k, label:v.label, color:v.color, icon:v.icon, val:catTotal(k) })).filter(c=>c.val>0).sort((a,b)=>b.val-a.val);
  const total = totalBudget();

  document.getElementById('tabBudget').innerHTML = `
    <div class="budget-wrap">
      <div class="budget-total">
        <div class="budget-total-num">
          ${totalByCurrency('JPY')>0?`¥${totalByCurrency('JPY').toLocaleString()}`:''}
          ${totalByCurrency('JPY')>0&&totalByCurrency('TWD')>0?`<span style="font-size:20px;color:var(--text3)"> + </span>`:''}
          ${totalByCurrency('TWD')>0?`<span style="color:#e07b3a">NT$${totalByCurrency('TWD').toLocaleString()}</span>`:''}
          ${totalByCurrency('JPY')===0&&totalByCurrency('TWD')===0?'¥0':''}
        </div>
        <div class="budget-total-label">旅行花費</div>
        ${recTotal>0 ? `<div style="margin-top:8px;font-size:13px;color:var(--teal)"><i class="ti ti-receipt"></i> 實際收據合計：¥${recTotal.toLocaleString()}</div>` : ''}
      </div>
      <div class="panel">
        <div style="font-size:13px;font-weight:500;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:6px;">
          <i class="ti ti-calendar-stats"></i> 每天花費分布
        </div>
        <div style="display:flex;flex-direction:column;gap:12px;">
          ${dayBars.map(d => {
            const parts = [];
            if (d.jpy > 0) parts.push(`¥${d.jpy.toLocaleString()}`);
            if (d.twd > 0) parts.push(`<span style="color:#e07b3a">NT$${d.twd.toLocaleString()}</span>`);
            const label = parts.length ? parts.join(' <span style="color:var(--text3);font-size:11px">+</span> ') : '¥0';
            return `
            <div class="budget-bar-row">
              <div class="budget-bar-label">
                <span style="color:var(--text2)">${d.label}</span>
                <span style="font-weight:600">${label}</span>
              </div>
              <div class="budget-bar-track">
                <div class="budget-bar-fill" style="width:${Math.round(d.total/maxDay*100)}%"></div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
      ${cats.length>0 ? `
      <div class="panel">
        <div style="font-size:13px;font-weight:500;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:6px;">
          <i class="ti ti-chart-pie"></i> 費用類別分解
        </div>
        <div class="budget-breakdown">
          ${cats.map(c => `
            <div class="budget-cat">
              <div class="budget-cat-label" style="color:${c.color}">
                <i class="ti ${c.icon}"></i> ${c.label}
              </div>
              <div class="budget-cat-val" style="color:${c.color}">¥${c.val.toLocaleString()}</div>
              <div class="budget-cat-pct">${total>0?Math.round(c.val/total*100):0}% 佔比</div>
            </div>
          `).join('')}
        </div>
      </div>` : ''}
    </div>
  `;
}

function handleImgUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    uploadPreviewData = e.target.result;
    const prev = document.getElementById('uploadPreview');
    if (prev) prev.innerHTML = `<img src="${uploadPreviewData}" alt="預覽" />`;
    const area = document.getElementById('uploadArea');
    if (area) area.style.borderColor = 'var(--accent)';
  };
  reader.readAsDataURL(file);
}

function addReceipt() {
  const name = document.getElementById('rName')?.value.trim();
  if (!name) { document.getElementById('rName')?.focus(); return; }
  const receipt = {
    id: 'r' + (++nextId),
    name,
    amount: parseInt(document.getElementById('rAmount')?.value) || 0,
    date: document.getElementById('rDate')?.value || '',
    cat: document.getElementById('rCat')?.value || 'other',
    note: document.getElementById('rNote')?.value.trim() || '',
    imgData: uploadPreviewData || null,
  };
  if (!state.receipts) state.receipts = [];
  state.receipts.push(receipt);
  uploadPreviewData = null;
  clearReceiptForm();
  renderStats();
  renderReceipts();
  save();
}

function delReceipt(id) {
  if (!confirm('確定刪除此收據？')) return;
  state.receipts = (state.receipts||[]).filter(r => r.id !== id);
  renderStats();
  renderReceipts();
  save();
}

function clearReceiptForm() {
  ['rName','rAmount','rDate','rNote'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  const rc = document.getElementById('rCat'); if(rc) rc.value='food';
  uploadPreviewData = null;
  const prev = document.getElementById('uploadPreview'); if(prev) prev.innerHTML='';
  const area = document.getElementById('uploadArea'); if(area) area.style.borderColor='';
  const fi = document.getElementById('rImg'); if(fi) fi.value='';
}

// Modal for receipt images
const imgDataMap = {};
function openModal(id) {
  const r = (state.receipts||[]).find(r=>r.id===id);
  if (!r || !r.imgData) return;
  document.getElementById('modalImg').src = r.imgData;
  document.getElementById('imgModal').classList.add('open');
}
function closeModal() { document.getElementById('imgModal').classList.remove('open'); }

/* ===== MAIN ===== */
function render() {
  document.getElementById('tripNameDisplay').textContent = state.title;
  renderStats();
  if (state.activeTab==='schedule') renderSchedule();
  else if (state.activeTab==='map') renderMap();
  else if (state.activeTab==='budget') renderBudget();
  else renderReceipts();
  save();
}

function switchTab(tab, btn) {
  state.activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  ['tabSchedule','tabMap','tabBudget','tabReceipts'].forEach(id => { document.getElementById(id).style.display='none'; });
  const tabId = tab==='schedule'?'tabSchedule':tab==='map'?'tabMap':tab==='budget'?'tabBudget':'tabReceipts';
  document.getElementById(tabId).style.display = '';
  render();
}

function switchDay(i) { state.activeDay = i; renderStats(); renderSchedule(); save(); }

function addDay() {
  const n = state.days.length + 1;
  const last = state.days[state.days.length-1]?.date;
  let nd = '';
  if (last) { const d=new Date(last); d.setDate(d.getDate()+1); nd=d.toISOString().slice(0,10); }
  state.days.push({ label: `第 ${n} 天`, date: nd, items: [] });
  state.activeDay = state.days.length - 1;
  render();
}

function delDay(i) {
  if (!confirm(`確定刪除「${state.days[i].label}」？`)) return;
  state.days.splice(i,1);
  state.activeDay = Math.min(state.activeDay, state.days.length-1);
  render();
}

function updateDate(i, val) { state.days[i].date = val; save(); }

function addItem() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { document.getElementById('fName').focus(); return; }
  state.days[state.activeDay].items.push({
    id: nextId++,
    time: document.getElementById('fTime').value || '09:00',
    type: document.getElementById('fType').value,
    name,
    note: document.getElementById('fNote').value.trim(),
    cost: parseInt(document.getElementById('fCost').value) || 0,
    currency: document.getElementById('fCurr').value || 'JPY',
  });
  clearForm();
  renderStats();
  renderSchedule();
  save();
}

function delItem(dayIdx, id) {
  state.days[dayIdx].items = state.days[dayIdx].items.filter(i => i.id !== id);
  renderStats();
  renderSchedule();
  save();
}

function startEdit(dayIdx, id) {
  // Hide any other open edit forms first
  document.querySelectorAll('[id^="editform-"]').forEach(el => el.style.display = 'none');
  const form = document.getElementById(`editform-${id}`);
  if (form) form.style.display = '';
}

function cancelEdit(id) {
  const form = document.getElementById(`editform-${id}`);
  if (form) form.style.display = 'none';
}

function saveEdit(dayIdx, id) {
  const name = document.getElementById(`ef-name-${id}`)?.value.trim();
  if (!name) { document.getElementById(`ef-name-${id}`)?.focus(); return; }
  const item = state.days[dayIdx].items.find(i => i.id === id);
  if (!item) return;
  item.time     = document.getElementById(`ef-time-${id}`)?.value || item.time;
  item.type     = document.getElementById(`ef-type-${id}`)?.value || item.type;
  item.name     = name;
  item.note     = document.getElementById(`ef-note-${id}`)?.value.trim() || '';
  item.cost     = parseInt(document.getElementById(`ef-cost-${id}`)?.value) || 0;
  item.currency = document.getElementById(`ef-curr-${id}`)?.value || 'JPY';
  renderStats();
  renderSchedule();
  save();
}

function clearForm() {
  ['fName','fNote','fCost'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  const ft = document.getElementById('fType'); if(ft) ft.value='sight';
  const ftm = document.getElementById('fTime'); if(ftm) ftm.value='10:00';
  const fc = document.getElementById('fCurr'); if(fc) fc.value='JPY';
}

function escAttr(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function exportTrip() {
  let text = `# ${state.title}\n\n`;
  state.days.forEach(d => {
    text += `## ${d.label}${d.date ? ' ('+d.date+')' : ''}\n`;
    [...d.items].sort((a,b)=>a.time.localeCompare(b.time)).forEach(i => {
      text += `- ${fmt24(i.time)} [${TYPE[i.type]?.label}] ${i.name}`;
      if (i.note) text += ` — ${i.note}`;
      if (i.cost) text += ` (${currSymbol(i.currency||'JPY')}${i.cost.toLocaleString()})`;
      text += '\n';
    });
    text += `小計：${dayTotalDisplay(d)}\n\n`;
  });
  const jpy = totalByCurrency('JPY'), twd = totalByCurrency('TWD');
  text += `總預算：`;
  if (jpy > 0) text += `¥${jpy.toLocaleString()} `;
  if (twd > 0) text += `NT$${twd.toLocaleString()}`;
  text += '\n';
  if ((state.receipts||[]).length>0) {
    text += `\n# 收據記錄\n`;
    state.receipts.forEach(r => {
      text += `- [${RECEIPT_CATS[r.cat]?.label||'其他'}] ${r.name}`;
      if (r.date) text += ` (${r.date})`;
      text += ` ¥${(r.amount||0).toLocaleString()}`;
      if (r.note) text += ` — ${r.note}`;
      text += '\n';
    });
    text += `收據合計：¥${totalReceipts().toLocaleString()}`;
  }
  const blob = new Blob([text], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${state.title}.txt`;
  a.click();
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Title edit
const nd = document.getElementById('tripNameDisplay');
const ni = document.getElementById('tripNameInput');
nd.onclick = () => { ni.value=state.title; nd.style.display='none'; ni.style.display='inline-block'; ni.focus(); };
ni.onblur = () => { if(ni.value.trim()) state.title=ni.value.trim(); nd.textContent=state.title; nd.style.display=''; ni.style.display='none'; save(); };
ni.onkeydown = e => { if(e.key==='Enter') ni.blur(); };

render();
</script>
